[build]
# Android NDK target triples (used by cargo-mobile2)
# Install via:
#   rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android
# iOS:
#   rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios

[target.aarch64-linux-android]
linker = "aarch64-linux-android24-clang"

[target.armv7-linux-androideabi]
linker = "armv7a-linux-androideabi24-clang"

[target.aarch64-apple-ios]
linker = "clang"
rustflags = ["-C", "link-arg=-framework", "-C", "link-arg=UIKit", "-C", "link-arg=-framework", "-C", "link-arg=CoreFoundation"]

# Net config
[net]
git-fetch-with-cli = true
