name: Deploy Web
on:
  push:
    branches:
      - main
  workflow_dispatch: {}
jobs:
  deploy:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push
        env:
          ECR: ${{ steps.ecr-login.outputs.registry }}
        run: |
          npm install -g bun
          bun install
          bun run db:generate
          docker build -t $ECR/eduplatform-web:latest .
          docker push $ECR/eduplatform-web:latest
      - name: Deploy
        run: |
          aws ecs update-service --cluster eduplatform-prod --service eduplatform-web --force-new-deployment
