name: Deploy Web
on:
  push:
    branches:
      - main
  workflow_dispatch: {}
jobs:
  deploy:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push with unique tag
        env:
          ECR: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          npm install -g bun
          bun install
          bun run db:generate
          # Push schema changes to RDS (safe — additive only)
          bunx prisma db push --accept-data-loss || echo "Schema push skipped (may already be in sync)"
          # CRITICAL: Remove local .env (has SQLite DATABASE_URL that overrides RDS)
          # The local .env has DATABASE_URL=file:... which makes PrismaClient
          # try to connect to SQLite with the postgresql provider → fails
          rm -f .env
          # Export DATABASE_URL so seed scripts (PrismaClient) use RDS Postgres
          export DATABASE_URL="$DATABASE_URL"
          # Seed Korean learning content (idempotent — uses upserts)
          bun run scripts/seed-korean.ts || echo "Seed skipped (may already exist)"
          # Seed fixed admin/teacher login tokens (idempotent)
          bun run scripts/seed-fixed-tokens.ts || echo "Token seed skipped"
          # Build with --no-cache to ensure fresh code, tag with commit SHA
          docker build --no-cache -t $ECR/eduplatform-web:$IMAGE_TAG -t $ECR/eduplatform-web:latest .
          docker push $ECR/eduplatform-web:$IMAGE_TAG
          docker push $ECR/eduplatform-web:latest
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Render and register new task definition
        env:
          ECR: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Render the task-def template with the new image tag
          sed "s|IMAGE_PLACEHOLDER|$ECR/eduplatform-web:$IMAGE_TAG|g" .github/ecs/task-def.json > task-def-rendered.json
          # Register a new task definition revision
          NEW_TD=$(aws ecs register-task-definition --cli-input-json file://task-def-rendered.json --region ${{ secrets.AWS_REGION }})
          NEW_TD_ARN=$(echo "$NEW_TD" | jq -r '.taskDefinition.taskDefinitionArn')
          echo "NEW_TD_ARN=$NEW_TD_ARN" >> $GITHUB_ENV
          echo "Registered new task definition: $NEW_TD_ARN"

      - name: Update ECS service with new task definition
        run: |
          aws ecs update-service \
            --cluster eduplatform-prod \
            --service eduplatform-web \
            --task-definition "$NEW_TD_ARN" \
            --force-new-deployment \
            --region ${{ secrets.AWS_REGION }}

      - name: Wait for service stabilization
        run: |
          echo "Waiting for service to stabilize..."
          aws ecs wait services-stable \
            --cluster eduplatform-prod \
            --services eduplatform-web \
            --region ${{ secrets.AWS_REGION }} || echo "Service did not stabilize within timeout, but deployment was triggered"
          echo "Deployment complete."
