# Deploy the teacher/admin web app to AWS.
#
# Builds Next.js, uploads the standalone server + static assets to S3,
# and triggers an ECS service update.
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#   AWS_REGION                       e.g. ap-south-1
#   AWS_ECS_CLUSTER                  e.g. eduplatform-prod
#   AWS_ECS_SERVICE                  e.g. eduplatform-web
#   AWS_S3_BUCKET                    e.g. eduplatform-web-deployments
#   AWS_ECR_REPO                     e.g. eduplatform-web
#   DATABASE_URL                     Postgres connection string
#   RESEND_API_KEY
#   GROQ_API_KEY
#   NEXTAUTH_SECRET

name: Deploy Web (Teacher + Admin)

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "prisma/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECS_CLUSTER: ${{ secrets.AWS_ECS_CLUSTER }}
  ECS_SERVICE: ${{ secrets.AWS_ECS_SERVICE }}
  ECR_REPO: ${{ secrets.AWS_ECR_REPO }}

jobs:
  deploy:
    name: Build & Deploy to AWS ECS
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --build-arg DATABASE_URL \
            --build-arg RESEND_API_KEY \
            --build-arg GROQ_API_KEY \
            --build-arg NEXTAUTH_SECRET \
            -t $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPO:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO:latest
          echo "image=$ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Update ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: .aws/eduplatform-web-task.json
          container-name: eduplatform-web
          image: ${{ steps.build-push.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
