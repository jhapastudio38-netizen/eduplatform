name: Deploy Web
on:
  push:
    branches:
      - main
  workflow_dispatch: {}
jobs:
  deploy:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: npm install --legacy-peer-deps
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Push schema to Supabase
        env:
          DATABASE_URL: postgresql://postgres:assissobigsexylady@db.rupwlrmtcwzqaohbsswj.supabase.co:5432/postgres
        run: |
          rm -f .env
          npx prisma db push --accept-data-loss || echo "Schema push skipped"
      - name: Seed
        env:
          DATABASE_URL: postgresql://postgres:assissobigsexylady@db.rupwlrmtcwzqaohbsswj.supabase.co:5432/postgres
        run: |
          npx tsx scripts/seed-korean.ts || echo "Seed skipped"
          npx tsx scripts/seed-fixed-tokens.ts || echo "Token seed skipped"
