# Build and push the Next.js Docker image to ECR, then deploy to ECS Fargate.
#
# Triggers:
#   - On push to main (when src/, prisma/, public/, Dockerfile, package.json change)
#   - Manual dispatch
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#   AWS_REGION
#   DATABASE_URL  (Postgres connection string — set with RDS endpoint)

name: Deploy Web to AWS

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "prisma/**"
      - "public/**"
      - "Dockerfile"
      - ".dockerignore"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECS_CLUSTER: eduplatform-prod
  ECS_SERVICE: eduplatform-web
  ECR_REPO: eduplatform-web

jobs:
  deploy:
    name: Build & Deploy to ECS
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPO:latest \
            -t $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG \
            .
          docker push $ECR_REGISTRY/$ECR_REPO:latest
          docker push $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Push Prisma schema to RDS
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # Install Prisma CLI in the runner and push the schema to RDS
          # The RDS instance is publicly accessible (we set --publicly-accessible)
          npx prisma db push --skip-generate --accept-data-loss 2>&1 | tail -20

      - name: Render new task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: scripts/task-def.json
          container-name: eduplatform-web
          image: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO }}:latest

      - name: Register task definition
        env:
          TASK_ROLE_ARN: arn:aws:iam::755395261031:role/ecsTaskExecutionRole
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_ENDPOINT: eduplatform-db.clkk64yekaq9.ap-south-1.rds.amazonaws.com
        run: |
          # Replace placeholders in task-def.json
          sed -i "s|\$TASK_ROLE_ARN|$TASK_ROLE_ARN|g" scripts/task-def.json
          sed -i "s|\$DB_PASSWORD|$DB_PASSWORD|g" scripts/task-def.json
          sed -i "s|\$DB_ENDPOINT|$DB_ENDPOINT|g" scripts/task-def.json
          aws ecs register-task-definition --cli-input-json file://scripts/task-def.json

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: scripts/task-def.json
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
