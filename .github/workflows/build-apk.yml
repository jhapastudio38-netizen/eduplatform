name: Build Student APK
on:
  push:
    branches:
      - main
  workflow_dispatch: {}
jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0"
      - run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q gradle-8.7-bin.zip -d $HOME
          echo "$HOME/gradle-8.7/bin" >> $GITHUB_PATH
      - run: gradle assembleDebug --no-daemon
        working-directory: student-app-rust/android-wrapper
      - uses: actions/upload-artifact@v4
        with:
          name: dreamkorea-apk
          path: student-app-rust/android-wrapper/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
