# Build iOS — REQUIRES Apple Developer Account to produce installable IPA.
#
# Without an Apple Developer Account ($99/year), we can only build an
# unsigned .app bundle that runs in the iOS Simulator. It cannot be
# installed on a physical device.
#
# To enable signed IPA builds:
#   1. Enroll at https://developer.apple.com/programs/
#   2. Create App ID "app.eduplatform.student" in Apple Developer Portal
#   3. Create a Distribution certificate + Provisioning Profile
#   4. Add these GitHub Secrets:
#      - APPLE_DEVELOPMENT_TEAM      (Team ID from Member Center)
#      - APPLE_PROVISIONING_PROFILE  (profile name)
#      - APPLE_CODE_SIGN_IDENTITY    (usually "iPhone Distribution")
#      - APP_STORE_CONNECT_API_KEY   (base64 of .p8 file)
#      - APP_STORE_CONNECT_API_KEY_ID
#      - APP_STORE_CONNECT_ISSUER_ID
#   5. Set `if: true` on the sign-and-upload step below

name: Build iOS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-ios-simulator:
    name: Build iOS (Simulator — unsigned)
    runs-on: macos-14
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install cargo-mobile2
        run: cargo install --git https://github.com/BrainiumLLC/cargo-mobile2 --locked

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            student-app-rust/target
          key: ios-cargo-${{ runner.os }}-${{ hashFiles('student-app-rust/Cargo.lock', 'student-app-rust/Cargo.toml') }}
          restore-keys: ios-cargo-${{ runner.os }}-

      - name: Init iOS project
        working-directory: student-app-rust
        run: |
          if [ ! -d ios ]; then
            cargo mobile init --platform ios \
              --name eduplatform-student \
              --package app.eduplatform.student
          fi

      - name: Build for iOS Simulator (aarch64-apple-ios-sim)
        working-directory: student-app-rust
        env:
          EDUPLATFORM_API_URL: ${{ secrets.EDUPLATFORM_API_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          cargo mobile build --platform ios --profile debug --target aarch64-apple-ios-sim
          # Fallback: direct cargo build for simulator
          if [ ! -d ios/build ]; then
            cargo build --target aarch64-apple-ios-sim --features ios --no-default-features
          fi

      - name: Find .app bundle
        id: find-app
        working-directory: student-app-rust
        run: |
          find . -name "*.app" -type d 2>/dev/null
          APP_PATH=$(find . -name "*.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app bundle built. Check Slint compile errors above."
            exit 1
          fi
          echo "app-path=$APP_PATH" >> $GITHUB_OUTPUT

      - name: Zip .app bundle
        working-directory: student-app-rust
        run: |
          cd $(dirname ${{ steps.find-app.outputs.app-path }})
          zip -r eduplatform-student-ios-sim.zip $(basename ${{ steps.find-app.outputs.app-path }})

      - name: Upload iOS Simulator build
        uses: actions/upload-artifact@v4
        with:
          name: eduplatform-student-ios-sim
          path: student-app-rust/**/*.zip
          if-no-files-found: error
          retention-days: 30

  # NOTE: This job is commented out because it requires Apple Developer secrets
  # that the user has not provided. To enable, fill in the secrets listed at
  # the top of this file and remove the `if: false` condition.
  sign-and-upload-ipa:
    name: Sign & Upload IPA to App Store Connect
    needs: build-ios-simulator
    runs-on: macos-14
    if: false  # set to true once Apple Developer secrets are configured
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release IPA
        working-directory: student-app-rust
        env:
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
          APPLE_CODE_SIGN_IDENTITY: ${{ secrets.APPLE_CODE_SIGN_IDENTITY }}
        run: |
          cargo mobile build --platform ios --profile release --target aarch64-apple-ios
          xcodebuild -workspace ios/eduplatform-student.xcworkspace \
            -scheme eduplatform-student \
            -configuration Release \
            -archivePath build/App.xcarchive \
            -destination 'generic/platform=iOS' \
            archive
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ios/ExportOptions.plist

      - name: Upload IPA to App Store Connect
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          echo "$APP_STORE_CONNECT_API_KEY" | base64 -d > /tmp/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8
          xcrun altool --upload-app \
            --type ios \
            --file student-app-rust/build/ipa/eduplatform-student.ipa \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"
