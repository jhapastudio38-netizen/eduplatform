# Build iOS — REQUIRES Apple Developer Account to produce installable IPA.
#
# Without an Apple Developer Account, we build the Rust .a static library
# for iOS. Wrapping it into a signed .ipa requires Xcode + provisioning
# profile (see DEPLOYMENT-GUIDE.md).

name: Build iOS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-ios:
    name: Build iOS static library
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            student-app-rust/target
          key: ios-cargo-${{ runner.os }}-${{ hashFiles('student-app-rust/Cargo.lock', 'student-app-rust/Cargo.toml') }}
          restore-keys: ios-cargo-${{ runner.os }}-

      - name: Build Rust .a for iOS (aarch64-apple-ios)
        working-directory: student-app-rust
        env:
          EDUPLATFORM_API_URL: ${{ secrets.EDUPLATFORM_API_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          cargo build --target aarch64-apple-ios --features ios --no-default-features --release || \
            cargo build --target aarch64-apple-ios --release

      - name: Locate the built .a
        id: find-a
        working-directory: student-app-rust
        run: |
          find . -name "*.a" -path "*aarch64-apple-ios*"
          A_PATH=$(find . -name "*.a" -path "*aarch64-apple-ios*" | head -1)
          if [ -z "$A_PATH" ]; then
            echo "::error::No .a was built. Check the cargo build output above."
            exit 1
          fi
          echo "a-path=$A_PATH" >> $GITHUB_OUTPUT

      - name: Upload .a artifact
        uses: actions/upload-artifact@v4
        with:
          name: eduplatform-student-ios-a
          path: student-app-rust/${{ steps.find-a.outputs.a-path }}
          if-no-files-found: error
          retention-days: 30

      - name: Build for iOS Simulator (aarch64-apple-ios-sim)
        working-directory: student-app-rust
        run: |
          cargo build --target aarch64-apple-ios-sim --features ios --no-default-features --release || \
            cargo build --target aarch64-apple-ios-sim --release

      - name: Locate simulator .a
        id: find-a-sim
        working-directory: student-app-rust
        run: |
          find . -name "*.a" -path "*sim*"
          A_PATH=$(find . -name "*.a" -path "*sim*" | head -1)
          if [ -z "$A_PATH" ]; then
            echo "::notice::No simulator .a built (may be expected if build failed)."
            echo "a-path=" >> $GITHUB_OUTPUT
          else
            echo "a-path=$A_PATH" >> $GITHUB_OUTPUT
          fi

      - name: Upload simulator .a
        if: steps.find-a-sim.outputs.a-path != ''
        uses: actions/upload-artifact@v4
        with:
          name: eduplatform-student-ios-sim-a
          path: student-app-rust/${{ steps.find-a-sim.outputs.a-path }}
          if-no-files-found: warn
          retention-days: 30
