name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - "student-app-rust/android-wrapper/**"
      - ".github/workflows/build-android-and-ios.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Build APK
        working-directory: student-app-rust/android-wrapper
        run: gradle assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dreamkorea-student-apk
          path: student-app-rust/android-wrapper/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
