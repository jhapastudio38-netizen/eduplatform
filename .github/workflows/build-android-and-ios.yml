# Build Android debug APK from the Rust student app.
#
# Output: unsigned debug APK (sideloadable for testing)
# For Play Store release: requires verified keystore (see DEPLOYMENT-GUIDE.md)

name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK (base)
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "ndk;26.1.10909125"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Install Linux deps for Slint cross-compile
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libgles2-mesa-dev libegl1-mesa-dev \
            libfreetype6-dev libfontconfig1-dev libglib2.0-dev \
            pkg-config

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            student-app-rust/target
          key: android-cargo-${{ runner.os }}-${{ hashFiles('student-app-rust/Cargo.lock', 'student-app-rust/Cargo.toml') }}
          restore-keys: android-cargo-${{ runner.os }}-

      - name: Install cargo-mobile2 (git clone + cargo install --path)
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
          GH_TOKEN: ${{ github.token }}
        run: |
          # Disable the credential helper that intercepts github.com requests
          git config --global --unset-all credential.helper || true
          git config --global credential.helper ""
          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/BrainiumLLC/cargo-mobile2" /tmp/cargo-mobile2
          cd /tmp/cargo-mobile2
          cargo install --path . --locked

      - name: Init Android project
        working-directory: student-app-rust
        run: |
          if [ ! -d android ]; then
            cargo mobile init --platform android \
              --name eduplatform-student \
              --package app.eduplatform.student
          fi

      - name: Build debug APK (aarch64)
        working-directory: student-app-rust
        env:
          EDUPLATFORM_API_URL: ${{ secrets.EDUPLATFORM_API_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          cargo mobile build --platform android --profile debug --target aarch64

      - name: Find built APK
        id: find-apk
        working-directory: student-app-rust
        run: |
          echo "Searching for APK files..."
          find . -name "*.apk" -type f 2>/dev/null
          APK_PATH=$(find . -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "::error::No APK was built"
            exit 1
          fi
          echo "apk-path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: eduplatform-student-debug-apk
          path: student-app-rust/${{ steps.find-apk.outputs.apk-path }}
          if-no-files-found: error
          retention-days: 30
