# Build Android debug APK from the Rust student app.
#
# This workflow builds an UNSIGNED/debug APK that can be sideloaded for testing.
# It does NOT publish to Play Store (that requires a verified keystore + service account).
#
# For iOS: see build-ios.yml — requires macOS runner + Apple Developer Account.
# We cannot produce an installable IPA without Apple code signing.

name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platforms;android-34
            build-tools;34.0.0
            ndk;26.1.10909125

      - name: Install Linux deps for Slint cross-compile
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libgles2-mesa-dev libegl1-mesa-dev \
            libfreetype6-dev libfontconfig1-dev libglib2.0-dev \
            pkg-config

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            student-app-rust/target
          key: android-cargo-${{ runner.os }}-${{ hashFiles('student-app-rust/Cargo.lock', 'student-app-rust/Cargo.toml') }}
          restore-keys: android-cargo-${{ runner.os }}-

      - name: Install cargo-mobile2
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: cargo install --git https://github.com/BrainiumLLC/cargo-mobile2 --locked

      - name: Init Android project
        working-directory: student-app-rust
        run: |
          if [ ! -d android ]; then
            cargo mobile init --platform android \
              --name eduplatform-student \
              --package app.eduplatform.student
          fi

      - name: Build debug APK (aarch64)
        working-directory: student-app-rust
        env:
          EDUPLATFORM_API_URL: ${{ secrets.EDUPLATFORM_API_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          cargo mobile build --platform android --profile debug --target aarch64
          # Fallback: try cargo build directly with android features if cargo mobile fails
          if [ ! -f target/aarch64-linux-android/debug/apk/eduplatform-student.apk ] && \
             [ ! -d android/app/build/outputs/apk ]; then
            echo "cargo-mobile2 build failed, trying direct cargo build..."
            cargo build --target aarch64-linux-android --features android --no-default-features
          fi

      - name: Find built APK
        id: find-apk
        working-directory: student-app-rust
        run: |
          echo "Searching for APK files..."
          find . -name "*.apk" -type f 2>/dev/null
          APK_PATH=$(find . -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "::error::No APK was built"
            exit 1
          fi
          echo "apk-path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: eduplatform-student-debug-apk
          path: student-app-rust/${{ steps.find-apk.outputs.apk-path }}
          if-no-files-found: error
          retention-days: 30
