# Build Android APK — compiles the Rust .so and wraps it into an installable APK.

name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "ndk;26.1.10909125"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Install Linux deps for Slint
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libgles2-mesa-dev libegl1-mesa-dev \
            libfreetype6-dev libfontconfig1-dev libglib2.0-dev \
            pkg-config

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            student-app-rust/target
          key: android-cargo-${{ runner.os }}-${{ hashFiles('student-app-rust/Cargo.lock', 'student-app-rust/Cargo.toml') }}
          restore-keys: android-cargo-${{ runner.os }}-

      - name: Build Rust .so for aarch64 Android
        working-directory: student-app-rust
        env:
          EDUPLATFORM_API_URL: ${{ secrets.EDUPLATFORM_API_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          export PATH="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH"
          cargo build --target aarch64-linux-android --features android --no-default-features --release
          # Copy .so into the Android wrapper's jniLibs
          mkdir -p ../android-wrapper/app/src/main/jniLibs/arm64-v8a
          cp target/aarch64-linux-android/release/libeduplatform_student.so \
             ../android-wrapper/app/src/main/jniLibs/arm64-v8a/ 2>/dev/null || \
          cp $(find target/aarch64-linux-android/release -name "*.so" | head -1) \
             ../android-wrapper/app/src/main/jniLibs/arm64-v8a/libeduplatform_student.so

      - name: Build APK with Gradle
        working-directory: student-app-rust/android-wrapper
        run: |
          chmod +x ./gradlew 2>/dev/null || true
          # Use gradle wrapper if present, else system gradle
          if [ -f ./gradlew ]; then
            ./gradlew assembleDebug --no-daemon
          else
            gradle assembleDebug --no-daemon
          fi

      - name: Find built APK
        id: find-apk
        working-directory: student-app-rust/android-wrapper
        run: |
          find . -name "*.apk" -type f 2>/dev/null
          APK_PATH=$(find . -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "::error::No APK was built"
            exit 1
          fi
          echo "apk-path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: eduplatform-student-debug-apk
          path: student-app-rust/android-wrapper/${{ steps.find-apk.outputs.apk-path }}
          if-no-files-found: error
          retention-days: 30
