# Build Android APK + AAB from the Rust student app on every push to main / tags.
#
# Outputs:
#   - app-debug.apk       (artifact, for internal testing)
#   - app-release.aab     (artifact + auto-uploaded to Play Store on tag)
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   EDUPLATFORM_KEYSTORE_BASE64     base64-encoded .jks keystore file
#   EDUPLATFORM_KEYSTORE_PASSWORD   keystore password (also alias password)
#   GROQ_API_KEY                    (baked into the binary at build time)
#   EDUPLATFORM_API_URL             e.g. https://api.eduplatform.app
#   PLAY_STORE_SERVICE_ACCOUNT_JSON base64-encoded service account JSON for Play API
#
# DO NOT commit real keystore files. They MUST be secrets.

name: Build Android

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-android:
    name: Build APK / AAB
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platforms;android-34
            build-tools;34.0.0
            ndk;26.1.10909125

      - name: Install cargo-mobile2
        run: cargo install --git https://github.com/BrainiumLLC/cargo-mobile2 --locked

      - name: Install Linux system deps (Slint)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libgles2-mesa-dev libegl1-mesa-dev \
            libfreetype6-dev libfontconfig1-dev libglib2.0-dev

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            student-app-rust/target
          key: android-cargo-${{ runner.os }}-${{ hashFiles('student-app-rust/Cargo.lock', 'student-app-rust/Cargo.toml') }}
          restore-keys: android-cargo-${{ runner.os }}-

      - name: Restore keystore from secret
        working-directory: student-app-rust
        env:
          KEYSTORE_BASE64: ${{ secrets.EDUPLATFORM_KEYSTORE_BASE64 }}
        run: |
          mkdir -p keystore
          echo "$KEYSTORE_BASE64" | base64 -d > keystore/eduplatform.jks
          ls -la keystore/

      - name: Initialize Android project (cargo-mobile2)
        working-directory: student-app-rust
        env:
          EDUPLATFORM_KEYSTORE_PASSWORD: ${{ secrets.EDUPLATFORM_KEYSTORE_PASSWORD }}
        run: |
          # cargo-mobile2 init creates the android/ folder if not present.
          if [ ! -d android ]; then
            cargo mobile init --platform android --name eduplatform-student --package app.eduplatform.student
          fi

      - name: Build debug APK
        working-directory: student-app-rust
        env:
          EDUPLATFORM_API_URL: ${{ secrets.EDUPLATFORM_API_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: cargo mobile build --platform android --profile debug --target aarch64

      - name: Build release AAB
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: student-app-rust
        env:
          EDUPLATFORM_API_URL: ${{ secrets.EDUPLATFORM_API_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          EDUPLATFORM_KEYSTORE_PASSWORD: ${{ secrets.EDUPLATFORM_KEYSTORE_PASSWORD }}
        run: cargo mobile build --platform android --profile release --target aarch64

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: eduplatform-android-apk
          path: |
            student-app-rust/target/aarch64-linux-android/debug/apk/eduplatform-student.apk
            student-app-rust/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload AAB artifact (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: eduplatform-android-aab
          path: |
            student-app-rust/android/app/build/outputs/bundle/**/*.aab
            student-app-rust/target/aarch64-linux-android/release/aab/eduplatform-student.aab
          if-no-files-found: warn
          retention-days: 90

      - name: Publish to Google Play (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: app.eduplatform.student
          releaseFiles: student-app-rust/android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          whatsNewDirectory: .github/play-release-notes/

  build-ios:
    name: Build iOS (IPA)
    needs: build-android
    runs-on: macos-14
    timeout-minutes: 90
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Install Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install cargo-mobile2
        run: cargo install --git https://github.com/BrainiumLLC/cargo-mobile2 --locked

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            student-app-rust/target
          key: ios-cargo-${{ runner.os }}-${{ hashFiles('student-app-rust/Cargo.lock', 'student-app-rust/Cargo.toml') }}
          restore-keys: ios-cargo-${{ runner.os }}-

      - name: Initialize iOS project
        working-directory: student-app-rust
        run: |
          if [ ! -d ios ]; then
            cargo mobile init --platform ios --name eduplatform-student --package app.eduplatform.student
          fi

      - name: Build iOS archive
        working-directory: student-app-rust
        env:
          EDUPLATFORM_API_URL: ${{ secrets.EDUPLATFORM_API_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
        run: cargo mobile build --platform ios --profile release --target aarch64

      - name: Export IPA
        working-directory: student-app-rust
        env:
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
          APPLE_CODE_SIGN_IDENTITY: ${{ secrets.APPLE_CODE_SIGN_IDENTITY }}
        run: |
          xcodebuild -workspace ios/eduplatform-student.xcworkspace \
            -scheme eduplatform-student \
            -configuration Release \
            -archivePath build/App.xcarchive \
            -destination 'generic/platform=iOS' \
            archive
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ios/ExportOptions.plist

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: eduplatform-ios-ipa
          path: student-app-rust/build/ipa/*.ipa
          if-no-files-found: warn
          retention-days: 90

      - name: Upload to App Store Connect
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          # Decode the API key
          echo "$APP_STORE_CONNECT_API_KEY" | base64 -d > /tmp/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8
          xcrun altool --upload-app \
            --type ios \
            --file student-app-rust/build/ipa/eduplatform-student.ipa \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --verbose
