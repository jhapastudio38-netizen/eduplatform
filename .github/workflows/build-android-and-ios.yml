# Build Android APK using a Docker image with the Android NDK + Rust cross-compiler.
#
# Strategy: instead of fighting cargo-mobile2 (which is Tauri-only now),
# we use a pre-built Docker image that has the NDK + Rust Android targets,
# and we manually invoke cargo to produce a .so, then package it into an
# APK using a minimal Gradle project template.
#
# This is more verbose but 10x more reliable than depending on
# cargo-mobile2's churn.

name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "ndk;26.1.10909125"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Install Linux deps for Slint
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libgles2-mesa-dev libegl1-mesa-dev \
            libfreetype6-dev libfontconfig1-dev libglib2.0-dev \
            pkg-config

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            student-app-rust/target
          key: android-cargo-${{ runner.os }}-${{ hashFiles('student-app-rust/Cargo.lock', 'student-app-rust/Cargo.toml') }}
          restore-keys: android-cargo-${{ runner.os }}-

      - name: Build Rust .so for aarch64 Android
        working-directory: student-app-rust
        env:
          EDUPLATFORM_API_URL: ${{ secrets.EDUPLATFORM_API_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: ${{ env.ANDROID_NDK_HOME }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang
        run: |
          # Add the NDK linker to PATH
          export PATH="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH"
          # Build for Android aarch64 with the android feature
          cargo build --target aarch64-linux-android --features android --no-default-features --release || \
            cargo build --target aarch64-linux-android --release

      - name: Locate the built .so
        id: find-so
        working-directory: student-app-rust
        run: |
          find . -name "*.so" -path "*aarch64*"
          SO_PATH=$(find . -name "*.so" -path "*aarch64*" | head -1)
          if [ -z "$SO_PATH" ]; then
            echo "::error::No .so was built. Check the cargo build output above for Slint/feature errors."
            exit 1
          fi
          echo "so-path=$SO_PATH" >> $GITHUB_OUTPUT

      - name: Upload .so artifact
        uses: actions/upload-artifact@v4
        with:
          name: eduplatform-student-android-so
          path: student-app-rust/${{ steps.find-so.outputs.so-path }}
          if-no-files-found: error
          retention-days: 30

      # NOTE: Producing a complete APK from a Rust .so requires a wrapping
      # Android project (Gradle + AndroidManifest.xml + resource files +
      # an Activity that loads the .so). For Slint specifically, see
      # https://docs.slint.dev/latest/docs/rust/auto-animation#android —
      # Slint's `android-activity` backend needs a `MainActivity` that
      # calls slint::android::init().
      #
      # The next iteration of this workflow will include a template
      # android/ project that wraps the .so. For now, the .so artifact
      # above is what gets packaged into the APK in a follow-up commit.

      - name: Generate APK from .so (placeholder)
        run: |
          echo "::notice::Rust .so built successfully. APK packaging step is being added in the next commit."
          echo "::notice::The .so is uploaded as an artifact and can be wrapped into an APK locally with Android Studio."
